name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - 'publish/**'

jobs:
  proxy:
    name: proxy (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: proxy/package-lock.json
      - run: npm ci
      - run: npm test

  playground:
    name: playground (lint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playground
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playground/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
