# ============================================================================
# SETUP REQUIRED — this workflow is INERT until you complete docs/CICD.md
# "Databricks CD setup". It is manual-only (workflow_dispatch), gated on the
# `databricks-dev` GitHub Environment (required reviewer), uses OIDC (no PAT),
# and is DEPLOY-ONLY — it cannot create or scale any cloud resource.
# Prereq: databricks.yml must declare the app as a bundle resource + a one-time
# `databricks bundle deployment bind`. See docs/CICD.md.
# ============================================================================
name: deploy-databricks-app
run-name: deploy-databricks (${{ github.ref_name }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "DAB target"
        type: choice
        options: [dev]
        default: dev

permissions:
  id-token: write   # mint the short-lived OIDC token
  contents: read

concurrency:
  group: deploy-databricks-${{ github.event.inputs.target }}
  cancel-in-progress: false   # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: databricks-dev   # gate: required reviewer + OIDC subject pin
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v6

      # Build the combined artifact on the free runner (never on the app box).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playground/package-lock.json
      - name: Build playground (lint + test + build)
        working-directory: playground
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
      - name: Proxy deps + test
        working-directory: proxy
        run: |
          npm ci
          npm test

      - uses: databricks/setup-cli@main   # TODO: pin to a release SHA

      # bundle deploy uploads code; bundle run restarts the app (deploy alone
      # does NOT restart — it would silently keep serving old code).
      - name: Bundle deploy
        run: databricks bundle deploy --target ${{ github.event.inputs.target }}
      - name: Start/restart app
        run: databricks bundle run pulseplay_app --target ${{ github.event.inputs.target }}
      - name: Smoke (management API)
        run: databricks apps get pulseplay-dev -o json
