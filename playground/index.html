<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!--
            Audit 2026-05-19 — PulsePlay does NOT yet ship a dark theme.
            Declaring `color-scheme: light only` keeps the browser from
            painting form controls / scrollbars in dark colors when the OS
            preference is dark, which would otherwise sit on top of the
            still-light surface CSS. Remove this when a real dark theme
            lands (see Settings → Preferences → Appearance).
        -->
        <meta name="color-scheme" content="light only" />
        <!--
            Content-Security-Policy — defence-in-depth allowlist covering
            every external origin PulsePlay legitimately reaches:
              • PulsePlay proxy (127.0.0.1:8787 in dev; deployers override
                via vite proxy config or a real production CSP)
              • Microsoft AAD login (MSAL.js SSO flow)
              • Power BI service (embed iframes + REST API)
              • Tableau / Qlik / Looker default hosts (BI iframes)
            `unsafe-eval` is required for Vite HMR in dev; production
            builds can drop it. CSP `meta` cannot set frame-ancestors —
            for clickjacking defence set X-Frame-Options at the edge.
        -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://login.microsoftonline.com https://*.msauth.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:8787 https://login.microsoftonline.com https://*.microsoftonline.com https://login.live.com https://graph.microsoft.com https://api.powerbi.com https://analysis.windows.net https://*.cloud.databricks.com https://*.azuredatabricks.net; frame-src 'self' https://app.powerbi.com https://*.powerbi.com https://login.microsoftonline.com https://*.tableau.com https://*.qlikcloud.com https://*.looker.com https://*.cloud.databricks.com https://*.azuredatabricks.net; worker-src 'self' blob:; object-src 'none'; base-uri 'self';" />
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M17 42V16h15c7 0 12 5 12 11s-5 11-12 11h-7v4h-8Zm8-12h7c3 0 5-1 5-3s-2-3-5-3h-7v6Z' fill='%23f8fafc'/%3E%3Ccircle cx='45' cy='43' r='6' fill='%2338bdf8'/%3E%3C/svg%3E" />
        <title>PulsePlay</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
